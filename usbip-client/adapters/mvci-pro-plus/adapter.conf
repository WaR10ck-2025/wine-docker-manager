# Xhorse MVCI PRO+ (XDMVJP) — Adapter-Konfiguration
# Kopieren nach: /etc/obd-adapter.conf auf dem Router
#
# HINWEIS: VID:PID variiert je nach Firmware-Version!
# Tatsächlichen VID:PID via lsusb ermitteln:
#   lsusb | grep -i "xhorse\|mvci"
#   Typisch: 04d8:xxxx oder hersteller-spezifisch
#
# WARNUNG: Kein Volvo-VIDA-Treiber von Xhorse!
# Für Volvo: godiag-gd101/adapter.conf verwenden.

ADAPTER_NAME="Xhorse MVCI PRO+"
ADAPTER_VENDOR="04d8"
ADAPTER_PRODUCT="0000"
ADAPTER_DRIVER="none"
ADAPTER_PROTOCOL="j2534"
ADAPTER_LINUX_SUPPORT="vm-only"
ADAPTER_NOTES="J2534 Multi-Brand. Gut für VAG/Toyota/Subaru. NICHT für Volvo VIDA."

