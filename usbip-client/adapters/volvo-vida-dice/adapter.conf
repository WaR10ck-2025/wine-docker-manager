# Volvo VIDA DiCE — Adapter-Konfiguration
# Kopieren nach: /etc/obd-adapter.conf auf dem Router
# Danach: /etc/init.d/usbipd restart
#
# HINWEIS: Linux-Treiber nicht verfügbar!
# DiCE wird via USB/IP an Windows-VM weitergeleitet.
# VIDA 2014D muss auf Windows installiert sein.

ADAPTER_NAME="Volvo VIDA DiCE"
ADAPTER_VENDOR="17aa"
ADAPTER_PRODUCT="d1ce"
ADAPTER_DRIVER="none"
ADAPTER_PROTOCOL="j2534"
ADAPTER_LINUX_SUPPORT="vm-only"
ADAPTER_NOTES="Kein Linux-Treiber. Nur via USB/IP -> Windows-VM -> VIDA 2014D."
