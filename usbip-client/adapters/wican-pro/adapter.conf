# WiCAN Pro — Adapter-Konfiguration
# Pfad B: WiFi-Bridge (kein USB/IP nötig!)
#
# WiCAN Pro verbindet sich mit Router-WiFi.
# Server greift direkt per SocketCAN TCP auf Adapter zu.
#
# HINWEIS: ADAPTER_VENDOR/PRODUCT nicht verwendet (kein USB-Bind auf Router)
# usbipd-openwrt ignoriert diese Config — WiFi-Adapter braucht keinen Bind.
#
# IP nach DHCP-Reservation eintragen (router-bridge-setup.md):
#   ADAPTER_WIFI_HOST="192.168.10.200"

ADAPTER_NAME="WiCAN Pro"
ADAPTER_VENDOR="none"
ADAPTER_PRODUCT="none"
ADAPTER_DRIVER="none"
ADAPTER_PROTOCOL="socketcan"
ADAPTER_LINUX_SUPPORT="yes"
ADAPTER_CONNECTION="wifi"
ADAPTER_WIFI_HOST="192.168.10.200"
ADAPTER_WIFI_PORT="3333"
ADAPTER_NOTES="WiFi-Bridge Pfad B. SocketCAN TCP. python-can + udsoncan. VIDA/vdash NICHT kompatibel."

# Chipset: ESP32-C3
# Firmware: Open-Source — https://github.com/meatpiHQ/wican-fw
# Preis: ~50-80 EUR (AliExpress / Crowd Supply)
