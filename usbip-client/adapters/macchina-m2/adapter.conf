# Macchina M2 / A0 — Adapter-Konfiguration
# Pfad B: WiFi-Bridge (kein USB/IP nötig)
#
# Open Hardware ESP32-basierter J2534-Adapter.
# Linux via Macchina-J2534 (Rust) oder OpenVehicleDiag (SocketCAN).
#
# DHCP-Reservation empfohlen: 192.168.10.201
# USB als Fallback: /dev/ttyACM0 (slcan)

ADAPTER_NAME="Macchina M2/A0"
ADAPTER_VENDOR="none"
ADAPTER_PRODUCT="none"
ADAPTER_DRIVER="none"
ADAPTER_PROTOCOL="socketcan"
ADAPTER_LINUX_SUPPORT="yes"
ADAPTER_CONNECTION="wifi"
ADAPTER_WIFI_HOST="192.168.10.201"
ADAPTER_WIFI_PORT="3333"
ADAPTER_NOTES="Open Hardware. Macchina-J2534 Rust-Treiber. OpenVehicleDiag. WiFi-Bridge Pfad B."

# Hardware: ESP32 (M2: + Arduino Due Shield)
# Firmware: Open-Source — https://github.com/rnd-ash/Macchina-J2534
# J2534-Treiber: Rust (experimentell) — Linux-kompatibel
# Preis: M2 ~100-130 EUR, A0 ~80-100 EUR
