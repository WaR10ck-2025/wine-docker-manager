# GODIAG GD101 — Adapter-Konfiguration
# Kopieren nach: /etc/obd-adapter.conf auf dem Router
#
# HINWEIS: VID:PID variiert je nach GD101-Version!
# Tatsächlichen VID:PID via lsusb ermitteln:
#   lsusb | grep -i "ftdi\|godiag\|0403"
#   FTDI-typisch: 0403:6001, 0403:6010, 0403:6014
#
# Empfehlung: vdash oder VIDA 2014D auf Windows-PC/VM

ADAPTER_NAME="GODIAG GD101"
ADAPTER_VENDOR="0403"
ADAPTER_PRODUCT="6001"
ADAPTER_DRIVER="ftdi_sio"
ADAPTER_PROTOCOL="j2534"
ADAPTER_LINUX_SUPPORT="partial"
ADAPTER_NOTES="Volvo VIDA/vdash bestaetigt. J2534. USB/IP -> Windows. VID:PID via lsusb pruefen!"

