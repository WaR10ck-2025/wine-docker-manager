# Autocom CDP+ Multi-Diag — Adapter-Konfiguration
# Kopieren nach: /etc/obd-adapter.conf auf dem Router
# Danach: /etc/init.d/usbipd restart

ADAPTER_NAME="Autocom CDP+"
ADAPTER_VENDOR="0403"
ADAPTER_PRODUCT="d6da"
ADAPTER_DRIVER="ftdi_sio"
ADAPTER_PROTOCOL="iso9141"
ADAPTER_LINUX_SUPPORT="yes"
ADAPTER_NOTES="Standard OBD2, Multi-Marken. Linux-nativ via ftdi_sio."
