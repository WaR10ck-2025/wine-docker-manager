# Vgate iCar 2 WiFi — Adapter-Konfiguration
# Pfad B: WiFi-Bridge (kein USB, kein USB/IP)
#
# ELM327-basierter WiFi-OBD2-Adapter (kein J2534!).
# python-obd via TCP-Socket (Port 35000).
#
# IP nach DHCP-Reservation eintragen:
#   Router DHCP → 192.168.10.201 (nach WiCAN .200)
# ODER direkt am iCar 2 AP:
#   ADAPTER_WIFI_HOST="192.168.0.10" (V-LINK SSID, kein Router)

ADAPTER_NAME="Vgate iCar 2 WiFi"
ADAPTER_VENDOR="none"
ADAPTER_PRODUCT="none"
ADAPTER_DRIVER="none"
ADAPTER_PROTOCOL="elm327"
ADAPTER_LINUX_SUPPORT="yes"
ADAPTER_CONNECTION="wifi"
ADAPTER_WIFI_HOST="192.168.10.201"
ADAPTER_WIFI_PORT="35000"
ADAPTER_NOTES="ELM327 V2.x. Kein J2534. python-obd TCP. Kein VIDA/vdash. Nur Standard-OBD2."

# Chipset: ELM327 V2.x + LPT230 WiFi
# Preis: ~20-40 EUR
# J2534: NEIN — für WiFi+J2534+Linux: WiCAN Pro verwenden!
